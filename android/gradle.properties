org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=128m
android.useAndroidX=true
android.enableJetifier=true
# Avoid intermittent Kotlin incremental cache failures on Windows when project and Pub cache live on different drives.
kotlin.incremental=false
kotlin.incremental.android=false
